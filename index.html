<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduClub</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
    <div data-include="components/header.html"></div>
    <main>
        <div data-include="sections/hero.html"></div>
        <div data-include="sections/features.html"></div>
        <div data-include="sections/tools.html"></div>
        <div data-include="sections/courses.html"></div>
        <div data-include="sections/progress.html"></div>
    </main>
    <div data-include="components/footer.html"></div>

    <!-- Load main.js only after includes are injected -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const includeElements = document.querySelectorAll('[data-include]');
            let includesLoaded = 0;

            includeElements.forEach(async (el) => {
                const file = el.getAttribute('data-include');
                try {
                    const res = await fetch(file);
                    const html = await res.text();
                    el.innerHTML = html;
                } catch (e) {
                    el.innerHTML = `<p>Could not load: ${file}</p>`;
                } finally {
                    includesLoaded++;
                    if (includesLoaded === includeElements.length) {
                        initApp(); // Load main logic
                    }
                }
            });
        });

        function initApp() {
            const script = document.createElement('script');
            script.src = "js/main.js";
            script.defer = true;
            document.body.appendChild(script);
        }
    </script>
</body>

</html>
