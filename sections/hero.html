<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduClub</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- Hero Section -->
    <section class="hero" id="home">
        <div class="container">
            <h1>Transform Your Learning Journey</h1>
            <p>Discover interactive courses, practice with advanced tools, and track your progress</p>
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput"
                    placeholder="Search for courses, topics, or resources...">
                <button class="search-btn" onclick="searchCourses()">🔍</button>
            </div>
            <div class="cta-buttons">
                <a href="#courses" class="btn btn-primary">Start Learning</a>
                <a href="#tools" class="btn btn-secondary">Try Tools</a>
            </div>
        </div>
    </section>

</body>

</html>
