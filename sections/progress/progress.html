<!-- Progress Tracker -->
<section class="progress-tracker" id="progress">
    <div class="container">
        <h2 class="section-title">Your Learning Progress</h2>
        <div class="progress-grid">
            <div class="progress-card">
                <h3>Overall Progress</h3>
                <div class="progress-circle" id="overallProgress">
                    <div class="progress-text">75%</div>
                </div>
                <p>Keep up the great work!</p>
            </div>
            <div class="progress-card">
                <h3>Courses Completed</h3>
                <div class="progress-circle" id="coursesProgress">
                    <div class="progress-text">12</div>
                </div>
                <p>Courses finished this month</p>
            </div>
            <div class="progress-card">
                <h3>Achievement Badges</h3>
                <div class="badges" id="badgesContainer">
                    <div class="badge">🏆</div>
                    <div class="badge">⭐</div>
                    <div class="badge">🎯</div>
                    <div class="badge locked">🔒</div>
                    <div class="badge locked">🔒</div>
                </div>
                <p>3 out of 5 badges earned</p>
            </div>
        </div>
    </div>
</section>
