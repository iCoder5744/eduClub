<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduClub</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

      <!-- Learning Tools -->
    <section class="learning-tools" id="tools">
        <div class="container">
            <h2 class="section-title">Interactive Learning Tools</h2>
            <div class="tools-grid">
                <!-- Math Solver -->
                <div class="tool-card">
                    <div class="tool-header">
                        <h3>🧮 Math Solver</h3>
                    </div>
                    <div class="tool-content">
                        <input type="text" class="calc-display" id="calcDisplay" readonly>
                        <div class="calculator">
                            <button class="calc-btn" onclick="clearCalc()">C</button>
                            <button class="calc-btn" onclick="deleteLast()">⌫</button>
                            <button class="calc-btn operator" onclick="appendToCalc('/')">/</button>
                            <button class="calc-btn operator" onclick="appendToCalc('*')">×</button>
                            
                            <button class="calc-btn" onclick="appendToCalc('7')">7</button>
                            <button class="calc-btn" onclick="appendToCalc('8')">8</button>
                            <button class="calc-btn" onclick="appendToCalc('9')">9</button>
                            <button class="calc-btn operator" onclick="appendToCalc('-')">-</button>
                            
                            <button class="calc-btn" onclick="appendToCalc('4')">4</button>
                            <button class="calc-btn" onclick="appendToCalc('5')">5</button>
                            <button class="calc-btn" onclick="appendToCalc('6')">6</button>
                            <button class="calc-btn operator" onclick="appendToCalc('+')">+</button>
                            
                            <button class="calc-btn" onclick="appendToCalc('1')">1</button>
                            <button class="calc-btn" onclick="appendToCalc('2')">2</button>
                            <button class="calc-btn" onclick="appendToCalc('3')">3</button>
                            <button class="calc-btn equals" onclick="calculateResult()" rowspan="2">=</button>
                            
                            <button class="calc-btn" onclick="appendToCalc('0')" style="grid-column: span 2;">0</button>
                            <button class="calc-btn" onclick="appendToCalc('.')">.</button>
                        </div>
                        <div id="calcSteps" class="mt-2"></div>
                    </div>
                </div>

                <!-- Flashcard Generator -->
                <div class="tool-card">
                    <div class="tool-header">
                        <h3>📄 Flashcard Generator</h3>
                    </div>
                    <div class="tool-content">
                        <div class="flashcard-form">
                            <input type="text" id="flashcardFront" placeholder="Front side (question)">
                            <input type="text" id="flashcardBack" placeholder="Back side (answer)">
                            <button class="btn btn-primary" onclick="addFlashcard()">Add Card</button>
                        </div>
                        <div id="flashcardContainer" class="flashcard-container"></div>
                        <button class="btn blue-btn btn-secondary mt-2" onclick="clearFlashcards()">Clear All</button>
                    </div>
                </div>

                <!-- Quiz System -->
                <div class="tool-card">
                    <div class="tool-header">
                        <h3>❓ Practice Quiz</h3>
                    </div>
                    <div class="tool-content">
                        <div id="quizContainer" class="quiz-container">
                            <button class="btn btn-primary" onclick="startQuiz()">Start New Quiz</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

</body>

</html>
